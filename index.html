<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Telegram Button</title>
  <style>
    /* Reset & Page Setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #030f0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Outer Card Container */
    .card-container {
      width: 100%;
      max-width: 380px;
      background: linear-gradient(180deg, #082d1e 0%, #03170e 100%);
      border-radius: 32px;
      padding: 30px 20px;
      border: 1px solid rgba(0, 230, 118, 0.2);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      text-align: center;
    }

    /* -------------------------------------------
       BUBBLING WRAPPER (Outer Glow & Bubbles)
    ------------------------------------------- */
    .bubble-wrapper {
      position: relative;
      display: block;
      margin: 25px 0;
      padding: 6px; /* Outer border spacing */
    }

    /* Bubbling Glowing Border Effect */
    .bubble-wrapper::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 35px;
      background: 
        radial-gradient(circle at 10% 20%, #00ff88 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, #00e676 0%, transparent 20%),
        radial-gradient(circle at 50% 0%, #a7ffeb 0%, transparent 25%),
        radial-gradient(circle at 30% 90%, #00b0ff 0%, transparent 20%);
      background-size: 100% 100%;
      filter: blur(4px);
      opacity: 0.9;
      animation: bubbleGlow 2s infinite alternate ease-in-out;
      z-index: 1;
    }

    /* Outer Animated Pulse Shadow */
    .bubble-wrapper::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 40px;
      border: 3px solid rgba(0, 255, 136, 0.6);
      box-shadow: 
        0 0 15px rgba(0, 255, 136, 0.5),
        inset 0 0 15px rgba(0, 255, 136, 0.5);
      animation: pulseBorder 1.8s infinite alternate ease-in-out;
      z-index: 1;
    }

    /* -------------------------------------------
       MAIN BUTTON (Bada & Bold)
    ------------------------------------------- */
    .telegram-btn {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 18px 24px; /* Slightly Bigger Size */
      background: linear-gradient(135deg, #00ff87 0%, #00e676 50%, #00b0ff 100%);
      border: 2px solid #ffffff;
      border-radius: 28px;
      color: #03170e;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 
        0 8px 25px rgba(0, 230, 118, 0.5),
        inset 0 2px 4px rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }

    .telegram-btn:hover {
      transform: scale(1.02);
      box-shadow: 
        0 12px 35px rgba(0, 255, 136, 0.8),
        inset 0 2px 6px rgba(255, 255, 255, 1);
    }

    /* Animations */
    @keyframes bubbleGlow {
      0% {
        transform: scale(0.98);
        filter: blur(3px) brightness(1);
      }
      100% {
        transform: scale(1.02);
        filter: blur(6px) brightness(1.3);
      }
    }

    @keyframes pulseBorder {
      0% {
        box-shadow: 0 0 10px rgba(0, 255, 136, 0.4), inset 0 0 10px rgba(0, 255, 136, 0.4);
      }
      100% {
        box-shadow: 0 0 25px rgba(0, 255, 136, 0.9), inset 0 0 20px rgba(0, 255, 136, 0.7);
      }
    }
  </style>
</head>
<body>

  <div class="card-container">
    <!-- Bubbling Button -->
    <div class="bubble-wrapper">
      <a href="https://t.me/your_link" class="telegram-btn" target="_blank">
        🚀 JOIN TELEGRAM FREE
      </a>
    </div>
  </div>

</body>
</html>
